version: '3.8'

services:
  asistencia:
    build: .
    container_name: app-asistencia
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/backend/data
    environment:
      - DATABASE_URL=sqlite:////app/backend/data/asistencia.db
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
